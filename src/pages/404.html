<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page not found</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1e293b;
      background: radial-gradient(1200px 600px at 100% -10%, #c7d2fe 0%, transparent 50%),
                  radial-gradient(1000px 500px at -10% 110%, #bae6fd 0%, transparent 50%),
                  #f8fafc;
    }
    .box { text-align: center; padding: 0 24px; }
    .code {
      font-size: clamp(5rem, 22vw, 11rem); font-weight: 800; line-height: 1; letter-spacing: -0.04em;
      background: linear-gradient(120deg, #4f46e5, #0ea5e9);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h1 { margin: 8px 0 6px; font-size: 1.4rem; font-weight: 700; }
    p { margin: 0 0 28px; color: #64748b; }
    a.home {
      display: inline-block; padding: 11px 22px; border-radius: 999px;
      background: #4f46e5; color: #fff; text-decoration: none; font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    a.home:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(79, 70, 229, 0.35); }
    @media (prefers-color-scheme: dark) {
      body { color: #e2e8f0; background:
        radial-gradient(1200px 600px at 100% -10%, #312e81 0%, transparent 50%),
        radial-gradient(1000px 500px at -10% 110%, #075985 0%, transparent 50%), #0f172a; }
      p { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you’re looking for doesn’t exist.</p>
    <a class="home" href="/">← Back to pages</a>
  </div>
</body>
</html>
